<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Loaded as a script tag (not fetch) so it works on file:// protocol -->
  <script src="countries.js"></script>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --border: #dde3ea;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --visited: #3b82f6;
      --unvisited: #cbd5e1;
      --unvisited-border: #94a3b8;
      --danger: #ef4444;
      --sidebar-width: 280px;
      --header-height: 52px;
      --radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: #334155;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --accent: #60a5fa;
        --visited: #60a5fa;
        --unvisited: #334155;
        --unvisited-border: #475569;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      z-index: 2000;
    }

    header h1 { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; }

    .layout {
      position: fixed;
      top: var(--header-height);
      left: 0; right: 0; bottom: 0;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      z-index: 1000;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      text-align: center;
    }

    .stat-card .value {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-card .label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    .add-section {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .add-section label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .add-row { display: flex; gap: 7px; }

    .add-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-size: 0.875rem;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-row input:focus { border-color: var(--accent); }
    .add-row input::placeholder { color: var(--text-muted); }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 7px 13px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }

    .error-msg {
      font-size: 0.72rem;
      color: var(--danger);
      margin-top: 5px;
      min-height: 15px;
    }

    .visited-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .visited-header {
      padding: 12px 14px 8px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .visited-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 14px 14px;
    }

    .visited-list::-webkit-scrollbar { width: 4px; }
    .visited-list::-webkit-scrollbar-track { background: transparent; }
    .visited-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .country-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 9px;
      border-radius: var(--radius);
      margin-bottom: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .country-item span { font-size: 0.85rem; font-weight: 500; }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 2px 5px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .remove-btn:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

    .empty-msg {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      padding: 20px 0;
      line-height: 1.6;
    }

    /* ── Map ── */
    #map {
      flex: 1;
      /* Ocean background that matches CartoDB Positron */
      background: #a8c8e8;
    }

    @media (prefers-color-scheme: dark) {
      #map { background: #1a2744; }
    }

    /* Make sure Leaflet fills its container */
    .leaflet-container { width: 100%; height: 100%; }

    .map-tooltip {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    /* Mobile */
    @media (max-width: 600px) {
      :root { --sidebar-width: 100%; }
      .layout { flex-direction: column-reverse; }
      .sidebar { width: 100%; border-right: none; border-top: 1px solid var(--border); max-height: 44vh; }
      #map { flex: 1; min-height: 0; }
    }
  </style>
</head>
<body>
  <header>
    <span style="font-size:1.25rem">🌍</span>
    <h1>Travel Tracker</h1>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="stats">
        <div class="stat-card">
          <div class="value" id="count">0</div>
          <div class="label">Countries</div>
        </div>
        <div class="stat-card">
          <div class="value" id="pct">0%</div>
          <div class="label">Of World</div>
        </div>
      </div>

      <div class="add-section">
        <label for="country-input">Add country</label>
        <div class="add-row">
          <input id="country-input" type="text" placeholder="e.g. France" autocomplete="off" />
          <button class="btn" id="add-btn">Add</button>
        </div>
        <div class="error-msg" id="error-msg"></div>
      </div>

      <div class="visited-section">
        <div class="visited-header">Visited</div>
        <div class="visited-list" id="visited-list"></div>
      </div>
    </aside>

    <div id="map"></div>
  </div>

  <script>
    // ── State ─────────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'travel-tracker-visited';
    let visited = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
    let geojsonLayer = null;
    let totalCountries = 0;

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...visited]));
    }

    // ── Map setup ─────────────────────────────────────────────────────────────
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    const map = L.map('map', {
      center: [20, 0],
      zoom: 2,
      minZoom: 1,
      maxZoom: 6,
      worldCopyJump: true,
      zoomControl: true,
    });

    // CartoDB Voyager (colorful, readable in both modes) for light;
    // CartoDB Dark Matter for dark — but with brighter country overlay colors
    const tileUrl = prefersDark
      ? 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png';

    L.tileLayer(tileUrl, {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    // ── Country styles ────────────────────────────────────────────────────────
    function styleFor(name) {
      const isVisited = visited.has(name);
      if (isVisited) {
        return { fillColor: '#3b82f6', fillOpacity: 0.75, color: '#1d4ed8', weight: 1 };
      }
      return prefersDark
        ? { fillColor: '#1e3a5f', fillOpacity: 0.6, color: '#2d5a8e', weight: 0.5 }
        : { fillColor: '#e2e8f0', fillOpacity: 0.7, color: '#94a3b8', weight: 0.5 };
    }

    function highlightFeature(e) {
      const layer = e.target;
      const isVisited = visited.has(layer.feature.properties.NAME);
      layer.setStyle({
        weight: 2,
        color: isVisited ? '#1d4ed8' : (prefersDark ? '#60a5fa' : '#64748b'),
        fillOpacity: isVisited ? 0.9 : 0.5,
      });
      layer.bringToFront();
    }

    function resetHighlight(e) { geojsonLayer.resetStyle(e.target); }

    function onCountryClick(e) {
      toggle(e.target.feature.properties.NAME);
    }

    // ── Load GeoJSON (via script tag global — works on file://) ──────────────
    if (!window.COUNTRIES_GEOJSON) {
      console.error('countries.js not loaded');
    } else {
      const data = window.COUNTRIES_GEOJSON;
      totalCountries = data.features.length;

      geojsonLayer = L.geoJSON(data, {
        style: f => styleFor(f.properties.NAME),
        onEachFeature: (feature, layer) => {
          const name = feature.properties.NAME;
          layer.bindTooltip(name, {
            sticky: true,
            className: 'map-tooltip',
            direction: 'top',
            offset: [0, -4],
          });
          layer.on({ mouseover: highlightFeature, mouseout: resetHighlight, click: onCountryClick });
        },
      }).addTo(map);

      refreshUI();
    }

    // ── Toggle / remove ───────────────────────────────────────────────────────
    function toggle(name, forceOn = false) {
      if (!name) return;
      if (forceOn || !visited.has(name)) visited.add(name);
      else visited.delete(name);
      save();
      refreshUI();
      refreshMap();
    }

    function remove(name) {
      visited.delete(name);
      save();
      refreshUI();
      refreshMap();
    }

    function refreshMap() {
      if (!geojsonLayer) return;
      geojsonLayer.eachLayer(l => geojsonLayer.resetStyle(l));
    }

    // ── UI ────────────────────────────────────────────────────────────────────
    function refreshUI() {
      const count = visited.size;
      const pct = totalCountries > 0 ? Math.round((count / totalCountries) * 100) : 0;
      document.getElementById('count').textContent = count;
      document.getElementById('pct').textContent = pct + '%';

      const list = document.getElementById('visited-list');
      const sorted = [...visited].sort((a, b) => a.localeCompare(b));

      if (sorted.length === 0) {
        list.innerHTML = '<div class="empty-msg">No countries yet.<br/>Click the map or type a name above.</div>';
        return;
      }

      list.innerHTML = sorted.map(name => `
        <div class="country-item">
          <span>${esc(name)}</span>
          <button class="remove-btn" title="Remove" data-name="${escAttr(name)}">✕</button>
        </div>
      `).join('');

      list.querySelectorAll('.remove-btn').forEach(btn =>
        btn.addEventListener('click', () => remove(btn.dataset.name))
      );
    }

    // ── Add by name ───────────────────────────────────────────────────────────
    function findCountryName(input) {
      if (!geojsonLayer) return null;
      const q = input.trim().toLowerCase();
      let exact = null, partial = null;
      geojsonLayer.eachLayer(layer => {
        const name = layer.feature.properties.NAME;
        const n = name.toLowerCase();
        if (n === q) exact = name;
        else if (!partial && n.includes(q)) partial = name;
      });
      return exact || partial;
    }

    function addByName() {
      const input = document.getElementById('country-input');
      const errorEl = document.getElementById('error-msg');
      const raw = input.value.trim();
      errorEl.textContent = '';
      if (!raw) return;

      const name = findCountryName(raw);
      if (!name) { errorEl.textContent = `"${raw}" not found. Check the spelling.`; return; }
      if (visited.has(name)) { errorEl.textContent = `${name} is already in your list.`; return; }

      toggle(name, true);
      input.value = '';
    }

    document.getElementById('add-btn').addEventListener('click', addByName);
    document.getElementById('country-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addByName();
    });

    // ── Escape helpers ────────────────────────────────────────────────────────
    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) { return s.replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
